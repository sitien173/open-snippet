name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Add EV certificate import and signing steps here when release cert plumbing exists.
      - name: Build Tauri bundles
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Package portable zip
        run: |
          $exe = "src-tauri/target/${{ matrix.target }}/release/openmacro.exe"
          if (!(Test-Path $exe)) {
            throw "Missing portable executable at $exe"
          }

          $portableDir = "src-tauri/target/${{ matrix.target }}/release/bundle/portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null

          $zip = Join-Path $portableDir "openmacro-${{ matrix.target }}-portable.zip"
          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }

          Compress-Archive -Path $exe -DestinationPath $zip

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmacro-${{ matrix.target }}-bundles
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/portable/*.zip

      - name: Publish release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/portable/*.zip
